<!DOCTYPE html>
<html>
<head>
  <title>Medication Barcode Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 10px;
    }

    button {
      padding: 10px;
      margin: 5px 0;
    }

    input, select {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      max-width: 320px;
    }

    #list, #searchResults {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
    }

    .manual {
      color: orange;
      font-weight: bold;
    }

    .unknown {
      color: red;
      font-weight: bold;
    }

    #status {
      font-weight: bold;
      margin: 10px 0;
    }

    #barcodeInput {
      position: absolute;
      opacity: 0;
      height: 0;
      width: 0;
    }
  </style>
</head>

<body>

<h2>Medication Barcode Scanner</h2>

<label>Ward:</label>
<select id="ward">
  <option value="76">76</option>
  <option value="77">77</option>
  <option value="78">78</option>
  <option value="79">79</option>
  <option value="710">710</option>
  <option value="85">85</option>
  <option value="86">86</option>
  <option value="87">87</option>
  <option value="88">88</option>
  <option value="89">89</option>
  <option value="810">810</option>
</select>

<br>

Bed: <input id="bed">
Tube: <input id="tube">

<hr>

<button onclick="startScannerMode()">Start Scanner</button>
<button onclick="stopScannerMode()">Stop Scanner</button>

<div id="status">Scanner OFF</div>

<input id="barcodeInput" placeholder="scan">

<h3>Current Session</h3>
<div id="list">No items yet</div>

<button onclick="submitSession()">Submit Session</button>

<hr>

<h3>Manual Entry</h3>
<input id="manualMed" placeholder="Enter medication name">
<button onclick="addManualMedication()">Add Manual Medication</button>

<hr>

<h3>Search Last 7 Days</h3>

<input id="searchMed" placeholder="Medication name">
<br>

<select id="searchWard">
  <option value="">All Wards</option>
  <option value="76">76</option>
  <option value="77">77</option>
  <option value="78">78</option>
  <option value="79">79</option>
  <option value="710">710</option>
  <option value="85">85</option>
  <option value="86">86</option>
  <option value="87">87</option>
  <option value="88">88</option>
  <option value="89">89</option>
  <option value="810">810</option>
</select>

<br>

<input id="searchTube" placeholder="Tube number (optional)">
<br>

<button onclick="searchLogs()">Search</button>

<div id="searchResults"></div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbzZO73dVMSnPbQgrgVAxoH5uwdpPSet-eEyz-4x3Okd8E1rMtBQwouBRfuw-q_FZw2HQg/exec";

let scannedItems = [];
let sessionId = crypto.randomUUID();
let medicationLookup = {};
window.lastLogs = [];

let scannerActive = false;

// ---------------- LOAD ----------------

async function loadData() {
  const res = await fetch(scriptURL);
  const data = await res.json();

  medicationLookup = data.meds || {};
  window.lastLogs = data.logs || [];
}

loadData();

// ---------------- SCANNER CONTROL ----------------

function startScannerMode() {
  scannerActive = true;
  document.getElementById("status").innerText = "Scanner ON";
  document.getElementById("barcodeInput").focus();
}

function stopScannerMode() {
  scannerActive = false;
  document.getElementById("status").innerText = "Scanner OFF";
}

// ---------------- BARCODE INPUT ----------------

const input = document.getElementById("barcodeInput");

input.addEventListener("keydown", function(e) {

  if (!scannerActive) return;

  if (e.key === "Enter") {

    const code = input.value.trim();
    if (!code) return;

    scannedItems.push(code);
    updateList();

    document.getElementById("status").innerText =
      "Scanned: " + code;

    input.value = "";
  }

});

// keep focus only when scanner ON
setInterval(() => {
  if (scannerActive) {
    input.focus();
  }
}, 800);

// ---------------- LIST ----------------

function updateList() {

  const el = document.getElementById("list");

  if (!scannedItems.length) {
    el.innerHTML = "No items yet";
    return;
  }

  el.innerHTML = scannedItems.map((code, i) => {

    let display;

    if (code.startsWith("MANUAL:")) {
      display = code.replace("MANUAL:", "");
    } else {
      display = medicationLookup[code] || ("UNKNOWN " + code);
    }

    return `
      <div class="card">
        <b>${i + 1}.</b> ${display}
        <button onclick="removeItem(${i})">❌ Remove</button>
      </div>
    `;

  }).join("");

}

// ---------------- REMOVE ONLY ----------------

function removeItem(index) {
  scannedItems.splice(index, 1);
  updateList();
}

// ---------------- MANUAL ENTRY ----------------

function addManualMedication() {

  const val = document.getElementById("manualMed").value.trim();
  if (!val) return;

  scannedItems.push("MANUAL:" + val);

  document.getElementById("manualMed").value = "";

  updateList();

}

// ---------------- SUBMIT ----------------

function submitSession() {

  if (!scannedItems.length) {
    alert("No scans");
    return;
  }

  const ward = document.getElementById("ward").value;
  const bed = document.getElementById("bed").value || "UNASSIGNED";
  const tube = document.getElementById("tube").value || "UNASSIGNED";

  scannedItems.forEach(code => {

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({
        scanId: sessionId,
        ward,
        bed,
        tube,
        code
      })
    });

  });

  alert("Submitted");

  scannedItems = [];
  updateList();

  sessionId = crypto.randomUUID();

}

// ---------------- SEARCH ----------------

function searchLogs() {

  const medInput = document.getElementById("searchMed").value.toLowerCase();
  const wardInput = document.getElementById("searchWard").value;
  const tubeInput = document.getElementById("searchTube").value.toLowerCase();

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  const results = [];

  window.lastLogs.forEach(r => {

    const time = new Date(r.time);
    if (time < cutoff) return;

    const wardMatch = !wardInput || r.ward == wardInput;
    const tubeMatch = !tubeInput || (r.tube || "").toLowerCase().includes(tubeInput);

    let med;

    if (r.code.startsWith("MANUAL:")) {
      med = r.code.replace("MANUAL:", "");
    } else {
      med = medicationLookup[r.code] || r.code;
    }

    const medMatch = !medInput || med.toLowerCase().includes(medInput);

    if (wardMatch && tubeMatch && medMatch) {
      results.push(r);
    }

  });

  renderSearch(results);

}

// ---------------- RENDER ----------------

function renderSearch(results) {

  const el = document.getElementById("searchResults");

  if (!results.length) {
    el.innerHTML = "No results";
    return;
  }

  el.innerHTML = results.map(r => {

    let med;

    if (r.code.startsWith("MANUAL:")) {
      med = r.code.replace("MANUAL:", "");
    } else {
      med = medicationLookup[r.code] || r.code;
    }

    return `
      <div class="card">
        <b>Date:</b> ${new Date(r.time).toLocaleString()}<br>
        <b>Ward:</b> ${r.ward} | <b>Tube:</b> ${r.tube}<br>
        <b>Medication:</b> ${med}
      </div>
    `;

  }).join("");

}

</script>

</body>
</html>
