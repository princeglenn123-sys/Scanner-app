<!DOCTYPE html>
<html>
<head>
  <title>Medication Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; padding: 10px; }

    input, select, button {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      max-width: 350px;
    }

    #list, #searchResults {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 8px;
    }

    #barcodeInput {
      width: 100%;
    }

    #status {
      font-weight: bold;
      margin: 10px 0;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Medication Scanner System</h2>

<label>Ward:</label>
<select id="ward">
  <option value="76">76</option>
  <option value="77">77</option>
  <option value="78">78</option>
  <option value="79">79</option>
  <option value="710">710</option>
  <option value="85">85</option>
  <option value="86">86</option>
  <option value="87">87</option>
  <option value="88">88</option>
  <option value="89">89</option>
  <option value="810">810</option>
</select>

<br>

Bed: <input id="bed">
Tube: <input id="tube">

<hr>

<div id="status">Scanner OFF</div>

<input id="barcodeInput" placeholder="Scan code here">

<br>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="stopScanner()">Stop Scanner</button>

<h3>Session Items</h3>
<div id="list">No items</div>

<button onclick="submitSession()">Submit</button>

<hr>

<h3>Manual Entry</h3>
<input id="manualMed" placeholder="Enter medication name">
<button onclick="addManual()">Add Manual</button>

<hr>

<h3>Search Last 7 Days</h3>

<input id="searchMed" placeholder="Medication">
<br>

<select id="searchWard">
  <option value="">All Wards</option>
  <option value="76">76</option>
  <option value="77">77</option>
  <option value="78">78</option>
  <option value="79">79</option>
  <option value="710">710</option>
  <option value="85">85</option>
  <option value="86">86</option>
  <option value="87">87</option>
  <option value="88">88</option>
  <option value="89">89</option>
  <option value="810">810</option>
</select>

<br>

<input id="searchTube" placeholder="Tube (optional)">
<br>

<button onclick="searchLogs()">Search</button>

<div id="searchResults"></div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbz2hJi7b7T519dgO0PcZuyp4UJab-c25C8S5twVSK-g3DpovxtoWapD37S-gH7FJ3R4zQ/exec";

let scannedItems = [];
let sessionId = crypto.randomUUID();

let scannerActive = false;

// ---------------- SCANNER CONTROL ----------------

function startScanner() {
  scannerActive = true;
  document.getElementById("status").innerText = "Scanner ON";
  document.getElementById("barcodeInput").focus();
}

function stopScanner() {
  scannerActive = false;
  document.getElementById("status").innerText = "Scanner OFF";
  document.getElementById("barcodeInput").blur();
}

// ---------------- SCAN INPUT ----------------

const input = document.getElementById("barcodeInput");

input.addEventListener("keydown", function(e) {

  if (!scannerActive) return;

  if (e.key !== "Enter") return;

  const code = input.value.trim();
  if (!code) return;

  scannedItems.push(code);
  updateList();

  input.value = "";
});

// ---------------- LIST ----------------

function updateList() {

  const el = document.getElementById("list");

  if (scannedItems.length === 0) {
    el.innerHTML = "No items";
    return;
  }

  el.innerHTML = scannedItems.map((c, i) => `
    <div class="card">
      ${i + 1}. ${c}
      <button onclick="removeItem(${i})">❌</button>
    </div>
  `).join("");
}

function removeItem(i) {
  scannedItems.splice(i, 1);
  updateList();
}

// ---------------- MANUAL ENTRY ----------------

function addManual() {

  const val = document.getElementById("manualMed").value.trim();

  if (!val) {
    alert("Enter medication name");
    return;
  }

  scannedItems.push("MANUAL:" + val);

  document.getElementById("manualMed").value = "";

  updateList();
}

// ---------------- SUBMIT ----------------

async function submitSession() {

  const ward = document.getElementById("ward").value;
  const bed = document.getElementById("bed").value || "NA";
  const tube = document.getElementById("tube").value || "NA";

  if (scannedItems.length === 0) {
    alert("No items to submit");
    return;
  }

  for (const code of scannedItems) {

    await fetch(scriptURL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        scanId: sessionId,
        ward,
        bed,
        tube,
        code
      })
    });

  }

  alert("Submitted");

  scannedItems = [];
  updateList();
  sessionId = crypto.randomUUID();
}

// ---------------- SEARCH ----------------

let lastLogs = [];
let meds = {};

async function loadData() {
  const res = await fetch(scriptURL);
  const data = await res.json();

  lastLogs = data.logs;
  meds = data.meds;
}

loadData();

function searchLogs() {

  const med = document.getElementById("searchMed").value.toLowerCase();
  const ward = document.getElementById("searchWard").value;
  const tube = document.getElementById("searchTube").value.toLowerCase();

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  const results = [];

  lastLogs.forEach(r => {

    const time = new Date(r.time);
    if (time < cutoff) return;

    const wardMatch = !ward || r.ward == ward;
    const tubeMatch = !tube || (r.tube || "").toLowerCase().includes(tube);
    const medMatch = !med || (r.code || "").toLowerCase().includes(med);

    if (wardMatch && tubeMatch && medMatch) {
      results.push(r);
    }

  });

  document.getElementById("searchResults").innerHTML =
    results.length
      ? results.map(r => `
        <div class="card">
          ${new Date(r.time).toLocaleString()}<br>
          Ward: ${r.ward} | Bed: ${r.bed} | Tube: ${r.tube}<br>
          Code: ${r.code}
        </div>
      `).join("")
      : "No results";
}

</script>

</body>
</html>
