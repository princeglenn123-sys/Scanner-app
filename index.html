<!DOCTYPE html>
<html>
<head>
  <title>Medication Scanner System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial;
      padding: 10px;
    }

    button {
      padding: 10px;
      margin: 5px 0;
    }

    input, select {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
      max-width: 320px;
    }

    #list, #searchResults {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
    }

    .manual {
      color: orange;
      font-weight: bold;
    }

    .unknown {
      color: red;
      font-weight: bold;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
    }

    #status {
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Medication Scanner</h2>

<label>Ward:</label>
<select id="ward">
  <option value="76">76</option>
  <option value="77">77</option>
  <option value="78">78</option>
  <option value="79">79</option>
  <option value="710">710</option>
  <option value="85">85</option>
  <option value="86">86</option>
  <option value="87">87</option>
  <option value="88">88</option>
  <option value="89">89</option>
  <option value="810">810</option>
</select>

<br>

Bed: <input id="bed">
Tube: <input id="tube">

<hr>

<button onclick="startScanner()">Start Camera</button>
<button onclick="unlockScanner()">Add Another Scan</button>
<button onclick="stopScanner()">Stop Camera</button>

<div id="status">Ready</div>

<div id="reader" style="width:320px;"></div>

<h3>Current Session</h3>
<div id="list">No items yet</div>

<button onclick="submitSession()">Submit Session</button>

<hr>

<h3>Manual Entry</h3>
<input id="manualMed" placeholder="Enter medication name">
<button onclick="addManualMedication()">Add Manual Medication</button>

<hr>

<h3>Search Last 7 Days</h3>

<input id="searchMed" placeholder="Medication name (partial allowed)">
<br>

<select id="searchWard">
  <option value="">All Wards</option>
  <option value="76">76</option>
  <option value="77">77</option>
  <option value="78">78</option>
  <option value="79">79</option>
  <option value="710">710</option>
  <option value="85">85</option>
  <option value="86">86</option>
  <option value="87">87</option>
  <option value="88">88</option>
  <option value="89">89</option>
  <option value="810">810</option>
</select>

<br>

<input id="searchTube" placeholder="Tube number (optional)">
<br>

<button onclick="searchLogs()">Search</button>

<div id="searchResults"></div>

<script>

const scriptURL =
"https://script.google.com/macros/s/AKfycbzZO73dVMSnPbQgrgVAxoH5uwdpPSet-eEyz-4x3Okd8E1rMtBQwouBRfuw-q_FZw2HQg/exec";

let html5QrCode;
let scannedItems = [];
let sessionId = crypto.randomUUID();
let scannerLocked = false;

let medicationLookup = {};
window.lastLogs = [];

// ---------------- LOAD ----------------

async function loadMedicationMaster() {

  const res = await fetch(scriptURL);
  const data = await res.json();

  medicationLookup = data.meds || {};
  window.lastLogs = data.logs || [];

}

loadMedicationMaster();

// ---------------- SCANNER ----------------

function startScanner() {

  html5QrCode = new Html5Qrcode("reader");

  const config = {
    fps: 10,
    qrbox: 220
  };

  Html5Qrcode.getCameras().then(devices => {

    let cam = devices[0].id;

    devices.forEach(d => {
      if (d.label.toLowerCase().includes("back")) cam = d.id;
    });

    html5QrCode.start(cam, config, onScan);
  });
}

function onScan(code) {

  if (scannerLocked) return;

  scannerLocked = true;
  scannedItems.push(code);

  updateList();

  document.getElementById("status").innerText =
    "Scanned → press Add Another Scan";

}

function unlockScanner() {
  scannerLocked = false;
  document.getElementById("status").innerText = "Ready";
}

function stopScanner() {
  if (html5QrCode) html5QrCode.stop();
}

// ---------------- LIST ----------------

function updateList() {

  const el = document.getElementById("list");

  if (scannedItems.length === 0) {
    el.innerHTML = "No items yet";
    return;
  }

  el.innerHTML = scannedItems.map((code, i) => {

    if (code.startsWith("MANUAL:")) {
      return `<div class="manual">${i+1}. ${code}</div>`;
    }

    const med = medicationLookup[code];

    if (!med) {
      return `<div class="unknown">${i+1}. UNKNOWN (${code})</div>`;
    }

    return `<div>${i+1}. ${med} (${code})</div>`;

  }).join("");

}

// ---------------- MANUAL ----------------

function addManualMedication() {

  const val = document.getElementById("manualMed").value.trim();
  if (!val) return;

  scannedItems.push("MANUAL:" + val);

  document.getElementById("manualMed").value = "";

  updateList();

}

// ---------------- SUBMIT ----------------

function submitSession() {

  if (!scannedItems.length) return alert("No scans");

  const ward = document.getElementById("ward").value;
  const bed = document.getElementById("bed").value || "UNASSIGNED";
  const tube = document.getElementById("tube").value || "UNASSIGNED";

  scannedItems.forEach(code => {

    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({
        scanId: sessionId,
        ward,
        bed,
        tube,
        code
      })
    });

  });

  alert("Submitted");

  scannedItems = [];
  updateList();

  sessionId = crypto.randomUUID();
  scannerLocked = false;

}

// ---------------- SEARCH ONLY ----------------

function searchLogs() {

  const medInput = document.getElementById("searchMed").value.toLowerCase();
  const wardInput = document.getElementById("searchWard").value;
  const tubeInput = document.getElementById("searchTube").value.toLowerCase();

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 7);

  const results = [];

  window.lastLogs.forEach(r => {

    const time = new Date(r.time);
    if (time < cutoff) return;

    const wardMatch = !wardInput || r.ward == wardInput;
    const tubeMatch = !tubeInput || (r.tube || "").toLowerCase().includes(tubeInput);

    let med;

    if (r.code.startsWith("MANUAL:")) {
      med = r.code.replace("MANUAL:", "");
    } else {
      med = medicationLookup[r.code] || r.code;
    }

    const medMatch = !medInput || med.toLowerCase().includes(medInput);

    if (wardMatch && tubeMatch && medMatch) {
      results.push(r);
    }

  });

  renderSearch(results);

}

// ---------------- RENDER ----------------

function renderSearch(results) {

  const el = document.getElementById("searchResults");

  if (!results.length) {
    el.innerHTML = "No results";
    return;
  }

  el.innerHTML = results.map(r => {

    let med;

    if (r.code.startsWith("MANUAL:")) {
      med = r.code.replace("MANUAL:", "");
    } else {
      med = medicationLookup[r.code] || r.code;
    }

    return `
      <div class="card">
        <b>Date:</b> ${new Date(r.time).toLocaleString()}<br>
        <b>Ward:</b> ${r.ward} | <b>Tube:</b> ${r.tube}<br>
        <b>Medication:</b> ${med}
      </div>
    `;

  }).join("");

}

</script>

</body>
</html>
