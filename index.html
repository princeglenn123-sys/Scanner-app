<!DOCTYPE html>
<html>
<head>
  <title>Scanner App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; padding: 10px; }
    #list, #logs {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
    }
    .item { padding: 4px; border-bottom: 1px solid #eee; }
  </style>
</head>

<body>

<h2>Medication Scanner</h2>

<div>
  <label>Ward:</label>
  <select id="ward">
    <option value="76" selected>76</option>
    <option value="77">77</option>
    <option value="78">78</option>
    <option value="79">79</option>
    <option value="710">710</option>
    <option value="85">85</option>
    <option value="86">86</option>
    <option value="87">87</option>
    <option value="88">88</option>
    <option value="89">89</option>
    <option value="810">810</option>
  </select>

  <br><br>

  Bed: <input id="bed"><br><br>
  Tube: <input id="tube"><br><br>
</div>

<hr>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="stopScanner()">Stop</button>

<div id="reader" style="width:320px;"></div>

<h3>Scanned Items</h3>
<div id="list">No items yet</div>

<button onclick="submitAll()">Submit All</button>

<hr>

<h3>Last 7 Days Logs</h3>
<button onclick="loadLogs()">Load Logs</button>
<div id="logs">Click to load logs</div>

<script>

// 🔥 UPDATED GOOGLE SCRIPT URL
const scriptURL =
"https://script.google.com/macros/s/AKfycbwGPM8r-7iJDWWBFZWhI8b-nC59dqJYCwGgf7aX9-tvLMWW3EWOJUMvMmac6WDLJmerfg/exec";

let html5QrCode;
let scannedItems = [];

// update scan list
function updateList() {
  const el = document.getElementById("list");

  if (scannedItems.length === 0) {
    el.innerHTML = "No items yet";
    return;
  }

  el.innerHTML = scannedItems.map((c,i)=>
    `<div class="item">${i+1}. ${c}</div>`
  ).join("");
}

// scan handler
function onScan(code) {
  scannedItems.push(code);
  updateList();
}

// start scanner
function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  const config = {
    fps: 20,
    qrbox: { width: 200, height: 200 }
  };

  Html5Qrcode.getCameras().then(devices => {
    let cameraId = devices[0].id;

    devices.forEach(d => {
      if (d.label.toLowerCase().includes("back")) cameraId = d.id;
    });

    html5QrCode.start(cameraId, config, onScan);
  });
}

// stop scanner
function stopScanner() {
  if (html5QrCode) html5QrCode.stop();
}

// submit all scans
function submitAll() {
  const ward = document.getElementById("ward").value;
  const bed = document.getElementById("bed").value;
  const tube = document.getElementById("tube").value;

  scannedItems.forEach(code => {
    fetch(scriptURL, {
      method: "POST",
      body: JSON.stringify({
        scanId: crypto.randomUUID(),
        ward,
        bed,
        tube,
        code
      })
    });
  });

  alert("Submitted " + scannedItems.length + " items");

  scannedItems = [];
  updateList();
}

// load last 7 days logs
function loadLogs() {
  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      const el = document.getElementById("logs");

      if (!data.length) {
        el.innerHTML = "No logs found";
        return;
      }

      el.innerHTML = data.reverse().map(r =>
        `<div class="item">
          ${r.time} | Ward ${r.ward} | Bed ${r.bed} | ${r.code}
        </div>`
      ).join("");
    });
}

</script>

</body>
</html>
